<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Carta para Ti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c2c2c;
            overflow: hidden;
            margin: 0;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 240px;
            cursor: pointer;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ede0d4;
            border-radius: 5px;
        }

        .letter {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 270px;
            height: 220px;
            background-color: #fff;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.6s ease-in-out, z-index 0.1s;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .letter h2 {
            font-family: 'Brush Script MT', cursive;
            color: #d32f2f;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .letter p {
            font-family: sans-serif;
            font-size: 0.8rem;
            color: #555;
        }

        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 3;
            border-style: solid;
            border-width: 120px 150px 120px 150px;
            border-color: transparent #d4c5a9 #d4c5a9 #d4c5a9;
            bottom: 0;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            z-index: 4;
            border-style: solid;
            border-width: 120px 150px 0 150px;
            border-color: #e0d2b4 transparent transparent transparent;
            transform-origin: top;
            transition: transform 0.4s ease-in-out, z-index 0.2s;
        }

        .heart {
            position: absolute;
            top: 120px;
            left: 50%;
            width: 30px;
            height: 30px;
            background-color: #d32f2f;
            z-index: 5;
            cursor: pointer;
            transform: translate(-50%, -50%) rotate(45deg);
            box-shadow: 1px 1px 5px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #d32f2f;
            border-radius: 50%;
        }

        .heart::before {
            top: -15px;
            left: 0;
        }

        .heart::after {
            left: -15px;
            top: 0;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
            50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.1); }
            100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
        }

        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-180px);
            z-index: 2;
        }

        .envelope-wrapper.open .heart {
            display: none;
        }
        
        .shadow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 20px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            filter: blur(5px);
        }

        @media (max-width: 400px) {
            .envelope-wrapper {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope">
        <div class="shadow"></div>
        <div class="envelope-back"></div>
        
        <div class="letter">
            <h2>Hola corazon de melon</h2>
            <p>Este es un mensaje especial para ti.
            Todos los dias busco la manera de hacerte 
            sentir feliz, segura, bonita y amada. 
            Realmente no se si estoy haciendo un 
            buen trabajo, pero todo lo hago de corazon. 
            Me encantas</p>
            <p>ILY❤️</p>
        </div>
        
        <div class="envelope-front"></div>
        <div class="envelope-flap"></div>
        <div class="heart"></div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');

        envelope.addEventListener('click', () => {
            envelope.classList.toggle('open');
        });
    </script>
</body>
</html>
